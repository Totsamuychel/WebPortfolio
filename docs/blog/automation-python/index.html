        <a href="#testimonials" onclick="scrollToSection('testimonials')" style="color: #667eea; text-decoration: none; padding: 8px 15px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.9em; white-space: nowrap;" data-i18n="testimonials">💬 Testimonials</a>

<div class="blog-page project-page">

        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <span style="background: rgba(102, 126, 234, 0.2); padding: 5px 15px; border-radius: 15px; color: #667eea; font-size: 0.9em;">Automation</span>

</div>

    <script src="/WebPortfolio/static/css/js/script.js"></script>

    <script src="/WebPortfolio/static/js/themes.js"></script>
    <script src="/WebPortfolio/static/js/theme-switcher.js"></script>
    <script>
        function scrollToSection(sectionId) {
            document.getElementById(sectionId).scrollIntoView({
                behavior: 'smooth'
            });
        }

        // Создание звезд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = 100;

            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
        });
    </script>
</body>
