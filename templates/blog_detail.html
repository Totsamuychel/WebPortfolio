{% extends 'base.html' %}

{% block content %}
<div class="blog-page project-page">
    <a href="{% url 'home' %}#blog" class="back-button">← Назад к статьям</a>
    
    <article class="blog-hero glass-card" style="padding: 60px 40px; margin-top: 40px;">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <span style="background: rgba(102, 126, 234, 0.2); padding: 5px 15px; border-radius: 15px; color: #667eea; font-size: 0.9em;">{{ post.category_tag }}</span>
            <span style="color: var(--text-secondary);">{{ post.date|date:"d F Y" }}</span>
        </div>
        
        <h2 class="text-gradient" style="font-size: 3em; margin-bottom: 30px;">{{ post.title }}</h2>
        
        <div class="blog-content" style="font-size: 1.2em; line-height: 1.8; color: var(--text-color);">
            {{ post.content|linebreaks }}
        </div>
    </article>
</div>
{% endblock %}
