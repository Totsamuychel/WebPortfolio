{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totsamuychel - AI Developer Portfolio</title>
    
    <!-- QA-1: SEO & Open Graph -->
    <meta name="description" content="Totsamuychel — AI/ML Developer. Python, Local AI Models, Computer Vision, Open Source.">
    <meta property="og:title" content="Totsamuychel — AI Developer Portfolio">
    <meta property="og:description" content="AI/ML Developer specializing in local AI, computer vision and automation.">
    <meta property="og:url" content="https://totsamuychel.github.io/WebPortfolio/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">

    <!-- QA-4: SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230077b6'/><text y='70' x='50' text-anchor='middle' font-size='55' font-family='sans-serif' font-weight='bold' fill='%2300b4d8'>TC</text></svg>">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="floating-particles" id="particles"></div>
    
    <!-- Навигационное меню DESIGN-3 -->
    <nav>
        <a href="{% url 'home' %}" class="nav-logo">TC</a>
        <div class="nav-links">
            <a href="{% url 'home' %}#about" data-i18n="about"><span>👋</span> About</a>
            <a href="{% url 'home' %}#skills" data-i18n="skills"><span>🛠️</span> Skills</a>
            <a href="{% url 'home' %}#testimonials" data-i18n="testimonials"><span>💬</span> Testimonials</a>
            <a href="{% url 'home' %}#projects" data-i18n="projects"><span>🚀</span> Projects</a>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p data-i18n="footer">&copy; 2025 Totsamuychel. All projects with open source code on GitHub</p>
    </footer>

    <!-- BUG-3: Исправленный путь к JS -->
    <script src="{% static 'js/translations.js' %}"></script>
    <script src="{% static 'js/language-switcher.js' %}"></script>
    <script src="{% static 'js/themes.js' %}"></script>
    <script src="{% static 'js/theme-switcher.js' %}"></script>
    <script src="{% static 'js/script.js' %}"></script>
    <script>
        function scrollToSection(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({
                    behavior: 'smooth'
                });
            }
        }

        // Создание звезд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            if (!starsContainer) return;
            const numberOfStars = 100;

            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
        });
    </script>
</body>
</html>
